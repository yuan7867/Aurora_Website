events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    upstream aurora_website {
        server aurora-website:8080;
    }

    upstream aurora_commerce {
        server aurora-commerce-api:8080;
    }

    upstream xau_license_api {
        server xau-license-api:8000;
    }

    upstream mt5_license_api {
        server mt5-license-api:8000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name aurorahy.com www.aurorahy.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name aurorahy.com www.aurorahy.com;

        ssl_certificate /etc/nginx/ssl/aurorahy.pem;
        ssl_certificate_key /etc/nginx/ssl/aurorahy.key;

        location / {
            proxy_pass http://aurora_website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /commerce/ {
            proxy_pass http://aurora_commerce/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/xau-bot/license {
            proxy_pass http://xau_license_api/api/xau-bot/license;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/aurora-mt5-ai-trader/license {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "POST, OPTIONS";
                add_header Access-Control-Allow-Headers "content-type";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_pass http://mt5_license_api/api/aurora-mt5-ai-trader/license;
            proxy_set_header Host $host;
            proxy_set_header Content-Type $content_type;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location /api/ {
            proxy_pass http://aurora_commerce;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="220"
    height="220"
    viewBox="0 0 220 220">

    <defs>

        <linearGradient
            id="auroraGradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop offset="0%" stop-color="#4FD1FF"/>

            <stop offset="100%" stop-color="#7B61FF"/>


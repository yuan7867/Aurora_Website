<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256">

    <defs>

        <linearGradient id="auroraGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="100%">

            <stop offset="0%" stop-color="#4FD1FF">
                <animate attributeName="stop-color"
                    values="#4FD1FF;#8B7CFF;#4FD1FF"
                    dur="6s"
                    repeatCount="indefinite"/>
            </stop>

            <stop offset="100%" stop-color="#8B7CFF">
                <animate attributeName="stop-color"
                    values="#8B7CFF;#4FD1FF;#8B7CFF"
                    dur="6s"
                    repeatCount="indefinite"/>
            </stop>

        </linearGradient>

        <filter id="auroraGlow">

            <feGaussianBlur
                stdDeviation="6"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

    <g filter="url(#auroraGlow)">

        <circle

            cx="128"

            cy="128"

            r="84"

            fill="none"

            stroke="url(#auroraGradient)"

            stroke-width="8">

            <animate

                attributeName="r"

                values="82;86;82"

                dur="4s"

                repeatCount="indefinite"/>

        </circle>

        <path

            d="M128 58
               L174 188
               L128 154
               L82 188
               Z"

            fill="url(#auroraGradient)">

            <animateTransform

                attributeName="transform"

                type="rotate"

                from="0 128 128"

                to="360 128 128"

                dur="30s"

                repeatCount="indefinite"/>

        </path>

    </g>

</svg>